name: AgentForge Auto-Fix

on:
  # Trigger when a PR's CI tests fail
  workflow_run:
    workflows: ["CI"]
    types: [completed]

  # Also allow manual triggering
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to analyze'
        required: false
        type: string
      task_file:
        description: 'Specific task YAML to run (optional)'
        required: false
        type: string

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  agent-fix:
    # Only run if the CI workflow failed AND it was triggered by a PR
    if: >
      (github.event_name == 'workflow_dispatch') ||
      (github.event.workflow_run.conclusion == 'failure' &&
       github.event.workflow_run.event == 'pull_request')
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # For workflow_run, checkout the PR's head
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install AgentForge
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Get PR info
        id: pr_info
        uses: actions/github-script@v7
        with:
          script: |
            let prNumber;

            if (context.payload.inputs && context.payload.inputs.pr_number) {
              prNumber = parseInt(context.payload.inputs.pr_number);
            } else if (context.payload.workflow_run) {
              // Find the PR associated with this workflow run
              const runs = await github.rest.actions.listWorkflowRuns({
                owner: context.repo.owner,
                repo: context.repo.repo,
                workflow_id: 'ci.yml',
                head_sha: context.payload.workflow_run.head_sha,
              });

              if (runs.data.workflow_runs.length > 0) {
                const prs = await github.rest.pulls.list({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  head: `${context.repo.owner}:${context.payload.workflow_run.head_branch}`,
                  state: 'open',
                });
                if (prs.data.length > 0) {
                  prNumber = prs.data[0].number;
                }
              }
            }

            if (prNumber) {
              core.setOutput('pr_number', prNumber);
              core.setOutput('has_pr', 'true');
              console.log(`Found PR #${prNumber}`);
            } else {
              core.setOutput('has_pr', 'false');
              console.log('No associated PR found');
            }

      - name: Analyze failing tests
        id: analyze
        if: steps.pr_info.outputs.has_pr == 'true'
        run: python scripts/ci_analyze.py --pr ${{ steps.pr_info.outputs.pr_number }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run AgentForge on failures
        id: agent_run
        if: steps.pr_info.outputs.has_pr == 'true'
        run: |
          python scripts/ci_agent_run.py \
            --pr ${{ steps.pr_info.outputs.pr_number }} \
            --config configs/default.yaml \
            --output results/ci/
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        continue-on-error: true

      - name: Post results to PR
        if: steps.pr_info.outputs.has_pr == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const prNumber = parseInt('${{ steps.pr_info.outputs.pr_number }}');

            let body = '';
            const commentPath = 'results/ci/pr_comment.md';
            if (fs.existsSync(commentPath)) {
              body = fs.readFileSync(commentPath, 'utf8');
            } else {
              body = '## AgentForge Analysis\n\nAgent run completed but no detailed results were generated. Check the workflow logs for details.';
            }

            // Find and update existing AgentForge comment, or create new one
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });

            const botComment = comments.data.find(c =>
              c.body.includes('## AgentForge') && c.user.type === 'Bot'
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body: body,
              });
            }

      - name: Upload results artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: agentforge-ci-results
          path: results/ci/
          retention-days: 30
