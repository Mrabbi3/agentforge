name: fix_lru_cache
description: >
  Fix an LRU cache implementation where the get() method returns the correct
  value but does not update the key's recency. This causes frequently accessed
  keys to be evicted prematurely.
category: coding
difficulty: hard
timeout: 240
tags:
  - python
  - data-structures
  - cache

setup_commands:
  - |
    cat > /tmp/lru_cache.py << 'PYEOF'
    from collections import OrderedDict
    from typing import Any, Optional


    class LRUCache:
        """Least Recently Used cache with fixed capacity."""

        def __init__(self, capacity: int):
            if capacity <= 0:
                raise ValueError("capacity must be positive")
            self.capacity = capacity
            self._cache: OrderedDict[str, Any] = OrderedDict()

        def get(self, key: str) -> Optional[Any]:
            """Get value by key. Returns None if not found."""
            if key not in self._cache:
                return None
            return self._cache[key]

        def put(self, key: str, value: Any) -> None:
            """Insert or update a key-value pair."""
            if key in self._cache:
                self._cache.move_to_end(key)
                self._cache[key] = value
            else:
                if len(self._cache) >= self.capacity:
                    self._cache.popitem(last=False)
                self._cache[key] = value

        def __len__(self) -> int:
            return len(self._cache)

        def __contains__(self, key: str) -> bool:
            return key in self._cache
    PYEOF

test_commands:
  - |
    python3 -c "
    import sys
    sys.path.insert(0, '/tmp')
    from lru_cache import LRUCache
    c = LRUCache(2)
    c.put('a', 1)
    c.put('b', 2)
    assert c.get('a') == 1, 'get a'
    c.put('c', 3)
    assert c.get('b') is None, 'b should be evicted, not a'
    assert c.get('a') == 1, 'a should still exist'
    assert c.get('c') == 3, 'c should exist'
    c2 = LRUCache(1)
    c2.put('x', 10)
    c2.put('y', 20)
    assert c2.get('x') is None, 'x evicted'
    assert c2.get('y') == 20, 'y exists'
    print('ALL TESTS PASSED')
    "

gold_patch: |
  --- a/lru_cache.py
  +++ b/lru_cache.py
  @@ -17,6 +17,7 @@
           if key not in self._cache:
               return None
  +        self._cache.move_to_end(key)
           return self._cache[key]
